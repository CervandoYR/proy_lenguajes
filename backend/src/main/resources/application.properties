spring.application.name=ecommerce
spring.config.import=optional:classpath:application-local.properties
server.port=${PORT:9001}

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:dbEcommerce}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:tu_password_local}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# JWT Secret (>= 256-bit secure key required by JJWT HS256)
jwt.secret=${JWT_SECRET:ServitekSuperSecureJwtSecretKey2026ForLocalDevelopmentAndProductionUse99!}
jwt.expiration=86400000

# Cloudinary Config (En Railway y Vercel se inyectan via variables de entorno privadas)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# Culqi Config
culqi.private-key=${CULQI_PRIVATE_KEY:sk_test_dummy_key_replace_me}

# Limite de subida de archivos (imagenes de productos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
gemini.api-key=${GEMINI_API_KEY:your_gemini_api_key}