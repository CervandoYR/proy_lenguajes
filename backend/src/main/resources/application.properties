spring.application.name=ecommerce
server.port=${PORT:9001}

# Importación opcional de application-local.properties (cargado automáticamente si existe localmente, ignorado en Railway)
spring.config.import=optional:classpath:application-local.properties

# Configuración Base de Datos MySQL (soporte nativo para variables de Railway MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD)
spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:dbEcommerce}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:Cervando01$#}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Secret (>= 256-bit secure key required by JJWT HS256)
jwt.secret=${JWT_SECRET:ServitekSuperSecureJwtSecretKey2026ForLocalDevelopmentAndProductionUse99!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:tu_cloud_name_aqui}
cloudinary.api-key=${CLOUDINARY_API_KEY:tu_api_key_aqui}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:tu_api_secret_aqui}

# Culqi Config
culqi.private-key=${CULQI_PRIVATE_KEY:sk_test_dummy_key_replace_me}

# Límite de subida de archivos (imágenes y modelos 3D de productos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Configuración de Correo SMTP (robusto con timeouts para entornos Linux/Railway/Docker)
servitek.mail.enabled=${SERVITEK_MAIL_ENABLED:true}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:yrcervando01@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:PON_TU_PASSWORD_AQUI}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
servitek.mail.from=${SERVITEK_MAIL_FROM:Servitek Peru <yrcervando01@gmail.com>}

# Gemini API
gemini.api-key=${GEMINI_API_KEY:PON_TU_API_KEY_DE_GEMINI_AQUI}
